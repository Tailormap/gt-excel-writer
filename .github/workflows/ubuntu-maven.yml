name: 'Ubuntu Maven build'

permissions:
  contents: read
  packages: read

env:
  MAVEN_OPTS: -Djava.awt.headless=true
  MAVEN_VERSION: '3.9.15'
  JAVA_VERSION: '21'

concurrency:
  group: ${{ github.workflow }}-${{ ( github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' ) && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "16 23 * * 0"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Set up Maven'
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: 'Test with Maven'
        run: |
          mvn -B -fae clean install -Dspotless.action=check -Dpom.fmt.action=verify -Dqa=true -DskipTests=true
          mvn -B -fae -e test -Dlogging-profile=verbose-logging

      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v6
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 'Upload test results to Codecov'
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/surefire-reports/TEST-*.xml
          report_type: test_results

  # Upload event file so test results can be processed for the PR
  # https://github.com/EnricoMi/publish-unit-test-result-action#support-fork-repositories-and-dependabot-branches
  event_file:
    name: "Event File"
    runs-on: ubuntu-slim
    permissions:
      contents: read
      actions: write
    steps:
      - name: 'Upload'
        uses: actions/upload-artifact@v7
        with:
          name: Event File
          path: ${{ github.event_path }}


  publish:
    name: 'Deploy artifacts'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      contents: read
    if: ${{ (github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')) }}
    steps:
      - uses: actions/checkout@v6

      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 'Set up Maven'
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: 'Build and Push'
        env:
          B3P_DEPLOY_ACTOR: ${{ secrets.B3P_DEPLOY_ACTOR }}
          B3P_DEPLOY_TOKEN: ${{ secrets.B3P_DEPLOY_TOKEN }}
        run: |
          mvn -B -V -fae -DskipTests -DskipITs -DskipQA=true -Pqa-skip clean deploy --settings .github/maven-settings.xml

  cleanup:
    name: 'Maven cache cleanup'
    if: ${{ always() }}
    needs: [ build, publish ]
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: setup-java-Linux-x64-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            setup-java-Linux-x64-maven-

      - name: 'Cleanup snapshot cache'
        run: |
          find ~/.m2/repository -name "*SNAPSHOT*" -type d | xargs rm -rf {}
